<div class="min-h-screen bg-gray-100 flex flex-col">

  <!-- 🔷 Navbar -->
  <nav class="bg-white shadow-md px-6 py-4 flex justify-between items-center">
    <h1 class="text-xl font-semibold text-gray-800">My Dashboard .. {{user_name}}</h1>

    <button
      (click)="logout()"
      class="bg-red-500 text-white px-4 py-1 rounded-lg hover:bg-red-500 transition"
    >
       <i class="fa-solid fa-right-from-bracket"></i>
    </button>
  </nav>

  <!-- 🔷 Content -->
  <div class="flex-1 p-6">

    <!-- Welcome -->
    <div class="bg-white p-6 rounded-2xl shadow mb-6">
      <h2 class="text-2xl font-bold text-gray-800">
        Welcome 👋
      </h2>
      <p class="text-gray-500 mt-2">
        You are successfully logged in.
      </p>
    </div>

    <!-- Cards -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

      <div class="bg-white p-6 rounded-2xl shadow hover:shadow-lg transition">
        <h3 class="text-lg font-semibold text-gray-700">Profile</h3>
        <p class="text-gray-500 mt-2">Manage your account details.</p>
      </div>

      <div class="bg-white p-6 rounded-2xl shadow hover:shadow-lg transition">
        <h3 class="text-lg font-semibold text-gray-700">Settings</h3>
        <p class="text-gray-500 mt-2">Update your preferences.</p>
      </div>

      <div class="bg-white p-6 rounded-2xl shadow hover:shadow-lg transition">
        <h3 class="text-lg font-semibold text-gray-700">Tasks</h3>
        <p class="text-gray-500 mt-2">View and manage your tasks.</p>
      </div>

    </div>

  </div>

</div>
