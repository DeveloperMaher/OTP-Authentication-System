<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md"
    *ngIf="!loading; else loadingTemplate">

    <h2 class="text-2xl font-bold text-center mb-6">Login</h2>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="space-y-4">

      <input
        formControlName="email"
        type="email"
        placeholder="Email"
        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
      />

      <input
        formControlName="password"
        type="password"
        placeholder="Password"
        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
      />

      <div class="flex items-center gap-2">
        <input
          type="checkbox"
          formControlName="rememberMe"
          class="w-4 h-4"
        />
        <label class="text-sm text-gray-600">Remember me</label>
      </div>

      <button
        type="submit"
        class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition"
      >
      Login 
      </button>

      <div class="text-center text-sm mt-3">
        Don't have an account?
        <a routerLink="/register" class="text-blue-500 hover:underline">
          Create one
        </a>
      </div>

    </form>

    <p *ngIf="errorMessage" class="text-red-500 text-sm text-center">
      {{ errorMessage }}
    </p>

  </div>

    <!-- LOADING -->
  <ng-template #loadingTemplate>
    <div class="flex flex-col items-center justify-center">
      <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
      <p class="mt-3 text-gray-600">Loading...</p>
    </div>
  </ng-template>

</div>
