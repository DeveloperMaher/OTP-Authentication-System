<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">

  <!-- FORM CARD -->
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8"
       *ngIf="!loading; else loadingTemplate">

    <h4 class="text-xl font-semibold text-center text-gray-800">
      Hallo, create an Account with us
    </h4>

    <hr class="my-4">

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-4">

      <!-- Username -->
      <div>
        <input
          type="text"
          formControlName="username"
          placeholder="Username"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        />

        <p class="text-red-500 text-sm mt-1"
           *ngIf="registerForm.get('username')?.touched && registerForm.get('username')?.invalid">
          Username is required.
        </p>
      </div>

      <!-- Email -->
      <div>
        <input
          type="email"
          formControlName="email"
          placeholder="Email"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        />

        <p class="text-red-500 text-sm mt-1"
           *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid">
          A valid email is required.
        </p>
      </div>

      <!-- Password -->
      <div>
        <input
          type="password"
          formControlName="password"
          placeholder="Password"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        />

        <p class="text-red-500 text-sm mt-1"
           *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid">
          Password is required (min 6 characters).
        </p>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        [disabled]="registerForm.invalid"
        class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition disabled:opacity-50"
      >
        Register
      </button>

      <!-- Login Link -->
      <div class="text-center text-sm mt-3">
        Do you have an account?
        <a routerLink="/login" class="text-blue-500 hover:underline">
          Login
        </a>
      </div>

    </form>

    <!-- Messages -->
    <p *ngIf="successMessage" class="text-green-600 text-sm mt-4 text-center">
      {{ successMessage }}
    </p>

    <p *ngIf="errorMessage" class="text-red-500 text-sm mt-4 text-center">
      {{ errorMessage }}
    </p>

  </div>

  <!-- LOADING -->
  <ng-template #loadingTemplate>
    <div class="flex flex-col items-center justify-center">
      <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
      <p class="mt-3 text-gray-600">Loading...</p>
    </div>
  </ng-template>

</div>
